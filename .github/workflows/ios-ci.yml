name: iOS CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT: CashRunway.xcodeproj
  SCHEME: CashRunway

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Install SwiftLint
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Run static analysis
        shell: bash
        run: |
          set -euo pipefail
          swiftlint lint --reporter github-actions-logging 2>&1 | tee swiftlint.log

      - name: Upload static analysis logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-logs
          path: swiftlint.log
          if-no-files-found: ignore

  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    timeout-minutes: 30
    needs: static-analysis

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/cache
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          swift test \
            --filter '(ModelSerializationTests|UtilityAndModelTests|BankCategoryMapperTests|BankConnectionServiceTests|BankSyncServiceTests)' \
            2>&1 | tee swift-unit-test.log

      - name: Upload unit test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-logs
          path: swift-unit-test.log
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests
    runs-on: macos-26
    timeout-minutes: 90
    needs: unit-tests

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/cache
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run integration tests
        shell: bash
        run: |
          set -euo pipefail
          swift test \
            --skip '(ModelSerializationTests|UtilityAndModelTests|BankCategoryMapperTests|BankConnectionServiceTests|BankSyncServiceTests)' \
            2>&1 | tee swift-integration-test.log

      - name: Upload integration test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-logs
          path: swift-integration-test.log
          if-no-files-found: ignore

