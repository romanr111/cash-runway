name: iOS CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT: CashRunway.xcodeproj
  SCHEME: CashRunway

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available | grep 'iPhone' || true

      - name: Pick iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          if xcrun simctl list devices available | grep -q 'iPhone 17 ('; then
            destination='platform=iOS Simulator,name=iPhone 17'
          else
            device_name="$(xcrun simctl list devices available | awk -F'[()]' '/iPhone/ && /Shutdown|Booted/ { sub(/^[[:space:]]+/, "", $1); print $1; exit }')"
            if [[ -z "${device_name}" ]]; then
              echo 'No available iPhone simulator found' >&2
              exit 1
            fi
            destination="platform=iOS Simulator,name=${device_name}"
          fi

          echo "destination=${destination}" >> "${GITHUB_OUTPUT}"
          echo "Using ${destination}"

      - name: Run Swift package tests
        run: swift test

      - name: Build app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -sdk iphonesimulator \
            -destination "${{ steps.simulator.outputs.destination }}" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log | grep -E '(warning:|error:|BUILD SUCCEEDED|BUILD FAILED)'

      - name: Run Xcode scheme tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -sdk iphonesimulator \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -resultBundlePath TestResults/CashRunway.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcode-test.log | grep -E '(warning:|error:|Test Suite|Test Case|passed|failed|TEST SUCCEEDED|TEST FAILED|BUILD SUCCEEDED|BUILD FAILED)'

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ci-failure-logs
          path: |
            xcodebuild.log
            xcode-test.log
            TestResults
          if-no-files-found: ignore
